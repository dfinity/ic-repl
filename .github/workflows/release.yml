name: Release
on:
  push:
    tags:
      - '*'
jobs:
  build:
    name: Release for ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-20.04
            name: linux64
            artifact_name: target/release/ic-repl
            asset_name: ic-repl-linux64
          - os: macos-13
            name: macos
            artifact_name: target/release/ic-repl
            asset_name: ic-repl-macos
          - os: ubuntu-latest
            name: arm
            artifact_name: target/arm-unknown-linux-gnueabihf/release/ic-repl
            asset_name: ic-repl-arm32
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install stable toolchain
        if: matrix.name != 'arm'
        uses: actions-rs/toolchain@16499b5e05bf2e26879000db0c1d13f7e13fa3af # v1.0.7
        with:
          profile: minimal
          toolchain: stable
          override: true
      - name: Install stable ARM toolchain
        if: matrix.name == 'arm'
        uses: actions-rs/toolchain@16499b5e05bf2e26879000db0c1d13f7e13fa3af # v1.0.7
        with:
          profile: minimal
          toolchain: stable
          override: true
          target: arm-unknown-linux-gnueabihf
      - name: Build
        if: matrix.name != 'arm'
        run: cargo build --release --locked
      - name: Cross build
        if: matrix.name == 'arm'
        uses: actions-rs/cargo@844f36862e911db73fe0815f00a4a2602c279505 # v1.0.3
        with:
          use-cross: true
          command: build
          args: --target arm-unknown-linux-gnueabihf --release --locked
      - name: 'Upload assets'
        uses: actions/upload-artifact@ff15f0306b3f739f7b6fd43fb5d26cd321bd4de5 # v3.2.1
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.artifact_name }}
          retention-days: 3
  test:
    needs: build
    name: Test for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            asset_name: ic-repl-linux64
          - os: ubuntu-20.04
            asset_name: ic-repl-linux64
          - os: macos-13
            asset_name: ic-repl-macos
          - os: macos-14
            asset_name: ic-repl-macos
    steps:
      - name: Get executable
        id: download
        uses: actions/download-artifact@9bc31d5ccc31df68ecc42ccf4149144866c47d8a # v3.0.2
        with:
          name: ${{ matrix.asset_name }}
      - name: Executable runs
        run: |
          chmod +x ic-repl
          ./ic-repl --version
  publish:
    needs: test
    name: Publish ${{ matrix.asset_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - asset_name: ic-repl-linux64
          - asset_name: ic-repl-arm32
          - asset_name: ic-repl-macos
    runs-on: ubuntu-latest
    steps:
      - name: Get executable
        uses: actions/download-artifact@9bc31d5ccc31df68ecc42ccf4149144866c47d8a # v3.0.2
        with:
          name: ${{ matrix.asset_name }}
      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@29e53e917877a24fad85510ded594ab3c9ca12de # 2.11.5
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ic-repl
          asset_name: ${{ matrix.asset_name }}
          tag: ${{ github.ref }}
